---
- name: Bootstrap Edge Node
  hosts: all
  become: yes
  gather_facts: no
  tasks:
    - name: Verify OS type and version compatibility
      raw: |
        if [ -f /etc/os-release ]; then
          . /etc/os-release
          OS_ID=$ID
          OS_VERSION_ID=$VERSION_ID
        else
          if [ -f /etc/debian_version ]; then
            OS_ID="debian"
            OS_VERSION_ID=$(cat /etc/debian_version | cut -d. -f1)
          else
            echo "OS_UNSUPPORTED: Could not determine operating system type."
            exit 1
          fi
        fi
        
        MAJOR_VERSION=$(echo "$OS_VERSION_ID" | cut -d. -f1 | tr -d '"')
        
        if ! echo "$MAJOR_VERSION" | grep -q '^[0-9]\+$'; then
          exit 0
        fi
        
        if [ "$OS_ID" = "debian" ]; then
          if [ "$MAJOR_VERSION" -lt 10 ]; then
            echo "OS_UNSUPPORTED: Debian version $OS_VERSION_ID is below Debian 10."
            exit 2
          fi
        elif [ "$OS_ID" = "ubuntu" ]; then
          if [ "$MAJOR_VERSION" -lt 18 ]; then
            echo "OS_UNSUPPORTED: Ubuntu version $OS_VERSION_ID is below Ubuntu 18."
            exit 2
          fi
        else
          if echo "$ID_LIKE" | grep -q "debian"; then
            echo "OS_UNSUPPORTED: Derivative OS $OS_ID ($OS_VERSION_ID) is not officially supported. Minimum requirement: Debian 10+ or Ubuntu 18+."
            exit 2
          else
            echo "OS_UNSUPPORTED: OS $OS_ID is not supported. Minimum requirement: Debian 10+ or Ubuntu 18+."
            exit 2
          fi
        fi
      changed_when: false

    - name: Ensure python3/pip are installed (with dynamic proxy test and temporary fallback)
      raw: |
        FORCE_ORCHESTRATOR="{% if force_orchestrator_proxy | default(false) | bool %}true{% else %}false{% endif %}"
        PROXY_RAW=$(apt-config dump | grep -i 'Acquire::http::Proxy ' | head -n1 | sed -E 's/.*http:\/\/([^"/]+).*/\1/')
        if [ "$FORCE_ORCHESTRATOR" != "true" ] && [ -n "$PROXY_RAW" ]; then
          PROXY_URL=$(echo "$PROXY_RAW" | sed -E 's/.*@//')
          PROXY_HOST=$(echo "$PROXY_URL" | cut -d: -f1)
          PROXY_PORT=$(echo "$PROXY_URL" | cut -d: -f2)
          if [ "$PROXY_PORT" = "$PROXY_HOST" ] || [ -z "$PROXY_PORT" ]; then
            PROXY_PORT=80
          fi
          if timeout 2 bash -c "cat < /dev/null > /dev/tcp/$PROXY_HOST/$PROXY_PORT" 2>/dev/null; then
            echo "Proxy $PROXY_HOST:$PROXY_PORT is reachable. Using proxy."
            apt-get update && apt-get install -y python3 python3-pip
            exit 0
          fi
        fi

        # Tier 2: Check direct internet access
        if [ "$FORCE_ORCHESTRATOR" != "true" ]; then
          if timeout 2 bash -c "cat < /dev/null > /dev/tcp/deb.debian.org/80" 2>/dev/null || \
             timeout 2 bash -c "cat < /dev/null > /dev/tcp/archive.ubuntu.com/80" 2>/dev/null; then
            echo "Direct internet connection is available. Disabling native proxy and running directly."
            if [ -n "$PROXY_RAW" ]; then
              for path in /etc/apt/apt.conf /etc/apt/apt.conf.d; do
                if [ -e "$path" ]; then
                  find "$path" -type f -exec grep -q "$PROXY_HOST" {} \; -print 2>/dev/null | while read -r f; do
                    mv "$f" "${f}.disabled"
                  done
                fi
              done
            fi
            apt-get update && apt-get install -y python3 python3-pip
            exit 0
          fi
        fi

        # Tier 3: Check orchestrator proxy
        # Detect incoming SSH connection IP
        DETECTED_SSH_IP=$(echo "$SSH_CONNECTION" | awk '{print $1}')
        if [ -z "$DETECTED_SSH_IP" ]; then
          DETECTED_SSH_IP=$(echo "$SSH_CLIENT" | awk '{print $1}')
        fi
        if [ -z "$DETECTED_SSH_IP" ]; then
          DETECTED_SSH_IP=$(who -m 2>/dev/null | awk '{print $NF}' | tr -d '()')
        fi

        IP_LIST=""
        if [ -n "{{ orchestrator_ip }}" ]; then
          IP_LIST="{{ orchestrator_ip }}"
        fi
        if [ -n "$DETECTED_SSH_IP" ] && [ "$DETECTED_SSH_IP" != "{{ orchestrator_ip }}" ]; then
          IP_LIST="$IP_LIST $DETECTED_SSH_IP"
        fi

        PROXY_SUCCESS=false
        for test_ip in $IP_LIST; do
          if timeout 2 bash -c "cat < /dev/null > /dev/tcp/$test_ip/3142" 2>/dev/null; then
            echo "Direct connection and native proxy failed. Using orchestrator APT proxy at $test_ip:3142."
            # Disable native proxy configurations temporarily
            if [ -n "$PROXY_RAW" ]; then
              for path in /etc/apt/apt.conf /etc/apt/apt.conf.d; do
                if [ -e "$path" ]; then
                  find "$path" -type f -exec grep -q "$PROXY_HOST" {} \; -print 2>/dev/null | while read -r f; do
                    mv "$f" "${f}.disabled"
                  done
                fi
              done
            fi
            echo "Acquire::http::Proxy \"http://$test_ip:3142\";" > /etc/apt/apt.conf.d/99orchestrator-proxy
            apt-get update && apt-get install -y python3 python3-pip
            PROXY_SUCCESS=true
            break
          fi
        done

        if [ "$PROXY_SUCCESS" = "true" ]; then
          exit 0
        fi

        echo "All access methods failed (native proxy, direct internet, and orchestrator proxy)."
        exit 3
      changed_when: false

    - name: Install dependencies
      apt:
        name:
          - borgbackup
          - parted
          - udev
          - dosfstools
          - e2fsprogs
          - util-linux
        state: present
        update_cache: yes

    - name: Create borg system user
      user:
        name: borg
        shell: /bin/bash
        create_home: yes
        system: yes

    - name: Generate SSH key for borg user
      user:
        name: borg
        generate_ssh_key: yes
        ssh_key_type: ed25519
        ssh_key_file: .ssh/id_ed25519

    - name: Read generated public key
      slurp:
        src: /home/borg/.ssh/id_ed25519.pub
      register: pubkey

    - name: Return public key to orchestrator
      debug:
        msg: "SSH_KEY: {{ pubkey['content'] | b64decode | trim }}"

    - name: Ensure .ssh directory exists for root
      file:
        path: /root/.ssh
        state: directory
        mode: '0700'
      when: orchestrator_ssh_pub_key is defined and orchestrator_ssh_pub_key | length > 0

    - name: Authorize orchestrator SSH public key on edge node
      lineinfile:
        path: /root/.ssh/authorized_keys
        line: "{{ orchestrator_ssh_pub_key }}"
        create: yes
        mode: '0600'
      when: orchestrator_ssh_pub_key is defined and orchestrator_ssh_pub_key | length > 0

    - name: Configure SSH to allow root login with keys
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin prohibit-password'
        state: present
      register: ssh_config_updated

    - name: Restart SSH service to apply configuration
      service:
        name: ssh
        state: restarted
      when: ssh_config_updated.changed

    - name: Gather partition and system details
      shell: |
        set -e
        root_part=$(findmnt -n -o SOURCE / || echo "")
        root_disk=$(lsblk -no PKNAME "$root_part" 2>/dev/null || echo "")
        if [ -z "$root_disk" ] && [ -n "$root_part" ]; then
          root_disk=$(echo "$root_part" | sed -E 's/p[0-9]+$//')
        fi
        if [ -n "$root_disk" ]; then
          disk_base=$(basename "$root_disk")
          rotational=$(cat /sys/block/"$disk_base"/queue/rotational 2>/dev/null || echo "1")
        else
          rotational="1"
        fi
        disk_type="SATA"
        if echo "$disk_base" | grep -q "nvme"; then
          disk_type="NVME"
        fi

        net_iface=$(ip -o route get 8.8.8.8 2>/dev/null | awk '{print $5}' || echo "")

        efi_part=$(findmnt -n -o SOURCE /boot/efi || findmnt -n -o SOURCE /boot || echo "")
        efi_uuid=""
        if [ -n "$efi_part" ]; then
          efi_uuid=$(blkid -s UUID -o value "$efi_part" || echo "")
        fi

        part_boot=$(findmnt -n -o SOURCE /boot || echo "")
        part_log=$(findmnt -n -o SOURCE /var/log/edge || echo "")
        part_stor=$(findmnt -n -o SOURCE /var/opt/edge || echo "")

        label_root=$(e2label "$root_part" 2>/dev/null || echo "")
        label_boot=$(e2label "$part_boot" 2>/dev/null || echo "")
        label_log=$(e2label "$part_log" 2>/dev/null || echo "")
        label_stor=$(e2label "$part_stor" 2>/dev/null || echo "")

        fstab_labels_ok="false"
        if grep -q "LABEL=edgeroot" /etc/fstab && grep -q "LABEL=edgeboot" /etc/fstab && grep -q "LABEL=edgelog" /etc/fstab && grep -q "LABEL=edgestor" /etc/fstab; then
          fstab_labels_ok="true"
        fi

        prepared="false"
        if [ "$label_root" = "edgeroot" ] && [ "$label_boot" = "edgeboot" ] && [ "$label_log" = "edgelog" ] && [ "$label_stor" = "edgestor" ] && [ "$fstab_labels_ok" = "true" ]; then
          prepared="true"
        fi

        os_name="Unknown"
        if [ -f /etc/os-release ]; then
          . /etc/os-release
          os_name="$NAME $VERSION_ID"
        elif [ -f /etc/debian_version ]; then
          os_name="Debian $(cat /etc/debian_version)"
        fi

        # Read CPU details
        cpu_info=$(lscpu | grep 'Model name' | cut -d: -f2- | xargs || true)
        if [ -z "$cpu_info" ]; then
          cpu_info=$(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2- | xargs || echo "Generic CPU")
        fi

        # Read Memory details (RAM)
        mem_info=$(free -h | awk '/^Mem:/ {print $2}' || echo "Unknown RAM")

        # Read EDGE Version from MOTD
        edge_ver="UNKNOWN"
        if [ -f /etc/motd ]; then
          edge_ver=$(awk '/EDGE:/ {getline; print; exit}' /etc/motd | xargs || echo "UNKNOWN")
        fi

        echo "DISK_TYPE:$disk_type"
        echo "EFI_UUID:$efi_uuid"
        echo "INTERFACE:$net_iface"
        echo "PREPARED:$prepared"
        echo "HOSTNAME:$(hostname)"
        echo "OS_VERSION:$os_name"
        echo "CPU_INFO:$cpu_info"
        echo "MEM_INFO:$mem_info"
        echo "EDGE_VERSION:$edge_ver"
        echo "PARTITION_LAYOUT_JSON:$(lsblk -J -b -o NAME,TYPE,FSTYPE,SIZE,MOUNTPOINT,LABEL,UUID,PARTUUID 2>/dev/null | tr -d '\n')"
      register: sys_info
      changed_when: false

    - name: Return system info to orchestrator
      debug:
        msg: "{{ sys_info.stdout_lines }}"

    - name: Restore proxy configurations and clean up orchestrator proxy
      shell: |
        rm -f /etc/apt/apt.conf.d/99orchestrator-proxy
        for path in /etc/apt/apt.conf /etc/apt/apt.conf.d; do
          if [ -e "$path" ]; then
            find "$path" -type f -name "*.disabled" 2>/dev/null | while read -r f; do
              mv "$f" "${f%.disabled}"
            done
          fi
        done
      changed_when: false
      failed_when: false
