---
- name: Bootstrap Edge Node
  hosts: all
  become: yes
  gather_facts: no
  tasks:
    - name: Ensure python3 and aptitude are installed
      raw: apt-get update && apt-get install -y python3 python3-pip
      changed_when: false

    - name: Install dependencies
      apt:
        name:
          - borgbackup
          - parted
          - udev
          - dosfstools
          - e2fsprogs
          - util-linux
        state: present
        update_cache: yes

    - name: Create borg system user
      user:
        name: borg
        shell: /bin/bash
        create_home: yes
        system: yes

    - name: Generate SSH key for borg user
      user:
        name: borg
        generate_ssh_key: yes
        ssh_key_type: ed25519
        ssh_key_file: .ssh/id_ed25519

    - name: Read generated public key
      slurp:
        src: /home/borg/.ssh/id_ed25519.pub
      register: pubkey

    - name: Return public key to orchestrator
      debug:
        msg: "SSH_KEY: {{ pubkey['content'] | b64decode | trim }}"

    - name: Ensure .ssh directory exists for root
      file:
        path: /root/.ssh
        state: directory
        mode: '0700'
      when: orchestrator_ssh_pub_key is defined and orchestrator_ssh_pub_key | length > 0

    - name: Authorize orchestrator SSH public key on edge node
      lineinfile:
        path: /root/.ssh/authorized_keys
        line: "{{ orchestrator_ssh_pub_key }}"
        create: yes
        mode: '0600'
      when: orchestrator_ssh_pub_key is defined and orchestrator_ssh_pub_key | length > 0

    - name: Configure SSH to allow root login with keys
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin prohibit-password'
        state: present
      register: ssh_config_updated

    - name: Restart SSH service to apply configuration
      service:
        name: ssh
        state: restarted
      when: ssh_config_updated.changed

    - name: Gather partition and system details
      shell: |
        set -e
        root_part=$(findmnt -n -o SOURCE / || echo "")
        root_disk=$(lsblk -no PKNAME "$root_part" 2>/dev/null || echo "")
        if [ -z "$root_disk" ] && [ -n "$root_part" ]; then
          root_disk=$(echo "$root_part" | sed -E 's/p[0-9]+$//')
        fi
        if [ -n "$root_disk" ]; then
          disk_base=$(basename "$root_disk")
          rotational=$(cat /sys/block/"$disk_base"/queue/rotational 2>/dev/null || echo "1")
        else
          rotational="1"
        fi
        disk_type="SATA"
        if [ "$rotational" = "0" ]; then
          disk_type="NVME"
        fi

        net_iface=$(ip -o route get 8.8.8.8 2>/dev/null | awk '{print $5}' || echo "")

        efi_part=$(findmnt -n -o SOURCE /boot/efi || findmnt -n -o SOURCE /boot || echo "")
        efi_uuid=""
        if [ -n "$efi_part" ]; then
          efi_uuid=$(blkid -s UUID -o value "$efi_part" || echo "")
        fi

        part_boot=$(findmnt -n -o SOURCE /boot || echo "")
        part_log=$(findmnt -n -o SOURCE /var/log/edge || echo "")
        part_stor=$(findmnt -n -o SOURCE /var/opt/edge || echo "")

        label_root=$(e2label "$root_part" 2>/dev/null || echo "")
        label_boot=$(e2label "$part_boot" 2>/dev/null || echo "")
        label_log=$(e2label "$part_log" 2>/dev/null || echo "")
        label_stor=$(e2label "$part_stor" 2>/dev/null || echo "")

        fstab_labels_ok="false"
        if grep -q "LABEL=edgeroot" /etc/fstab && grep -q "LABEL=edgeboot" /etc/fstab && grep -q "LABEL=edgelog" /etc/fstab && grep -q "LABEL=edgestor" /etc/fstab; then
          fstab_labels_ok="true"
        fi

        prepared="false"
        if [ "$label_root" = "edgeroot" ] && [ "$label_boot" = "edgeboot" ] && [ "$label_log" = "edgelog" ] && [ "$label_stor" = "edgestor" ] && [ "$fstab_labels_ok" = "true" ]; then
          prepared="true"
        fi

        echo "DISK_TYPE:$disk_type"
        echo "EFI_UUID:$efi_uuid"
        echo "INTERFACE:$net_iface"
        echo "PREPARED:$prepared"
        echo "PARTITION_LAYOUT_JSON:$(lsblk -J -b -o NAME,TYPE,FSTYPE,SIZE,MOUNTPOINT,LABEL,UUID 2>/dev/null | tr -d '\n')"
      register: sys_info
      changed_when: false

    - name: Return system info to orchestrator
      debug:
        msg: "{{ sys_info.stdout_lines }}"
