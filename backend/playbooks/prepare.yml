---
- name: Auto-Prepare Edge Node (Fix Labels & Configure Fstab)
  hosts: all
  become: yes
  tasks:
    - name: Run prepare tasks in block to handle errors and rollbacks
      block:
        - name: Backup remote fstab
          copy:
            src: /etc/fstab
            dest: /etc/fstab.bak
            remote_src: yes
            mode: '0644'

        - name: Gather partition and system details
          shell: |
            set -e
            part_root=$(findmnt -n -o SOURCE /)
            part_efi=$(findmnt -n -o SOURCE /boot/efi)
            part_boot=$(findmnt -n -o SOURCE /boot)
            part_log=$(findmnt -n -o SOURCE /var/log/edge)
            part_stor=$(findmnt -n -o SOURCE /var/opt/edge)

            if [ -z "$part_root" ] || [ -z "$part_efi" ] || [ -z "$part_boot" ] || [ -z "$part_log" ] || [ -z "$part_stor" ]; then
              echo "ERROR: One or more of the 5 required partitions is not mounted!" >&2
              exit 1
            fi

            # Detect root parent disk
            root_disk=$(lsblk -no PKNAME "$part_root" 2>/dev/null || echo "")
            if [ -z "$root_disk" ]; then
              root_disk=$(echo "$part_root" | sed -E 's/p[0-9]+$//')
            fi
            disk_base=$(basename "$root_disk")
            
            disk_size=""
            disk_model=""
            if [ -n "$root_disk" ]; then
              disk_size=$(lsblk -d -no SIZE "/dev/$disk_base" 2>/dev/null | xargs || echo "")
              disk_model=$(lsblk -d -no MODEL "/dev/$disk_base" 2>/dev/null | xargs || echo "")
            fi

            disk_type_str="SATA"
            if echo "$disk_base" | grep -q "nvme"; then
              disk_type_str="NVME"
            fi

            if [ -n "$disk_size" ]; then
              if [ -n "$disk_model" ]; then
                disk_type="$disk_type_str $disk_size ($disk_model)"
              else
                disk_type="$disk_type_str $disk_size"
              fi
            else
              disk_type="$disk_type_str"
            fi

            # Find active network interface
            net_iface=$(ip -o route get 8.8.8.8 | awk '{print $5}')

            # Read actual, live hardware UUID of the EFI partition
            efi_uuid=$(blkid -s UUID -o value "$part_efi")
            if [ -z "$efi_uuid" ]; then
              echo "ERROR: Failed to retrieve EFI partition UUID!" >&2
              exit 1
            fi

            # Read CPU details
            cpu_info=$(lscpu | grep -m1 'Model name' | cut -d: -f2- | xargs || true)
            if [ -z "$cpu_info" ]; then
              cpu_info=$(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2- | xargs || echo "Generic CPU")
            fi

            # Read Memory details (RAM)
            mem_info=$(free -h | awk '/^Mem:/ {print $2}' || echo "Unknown RAM")

            # Get detailed RAM info using dmidecode
            ram_details=""
            if command -v dmidecode >/dev/null 2>&1; then
              ram_sizes=$(dmidecode -t 17 2>/dev/null | grep -E '^[[:space:]]*Size:' | grep -iv "No Board" | grep -v "No Device" | grep -E "[0-9]" || echo "")
              ram_count=$(echo "$ram_sizes" | wc -l)
              if [ "$ram_count" -gt 0 ] && [ -n "$ram_sizes" ]; then
                ram_type=$(dmidecode -t 17 2>/dev/null | grep -A10 "Memory Device" | grep -m1 "Type:" | cut -d: -f2 | xargs || echo "")
                ram_speed=$(dmidecode -t 17 2>/dev/null | grep -A15 "Memory Device" | grep -m1 "Speed:" | cut -d: -f2 | xargs || echo "")
                ram_size_first=$(echo "$ram_sizes" | head -n1 | cut -d: -f2 | xargs || echo "")
                if [ -z "$ram_speed" ] || [ "$ram_speed" = "Unknown" ]; then
                  ram_speed=$(dmidecode -t 17 2>/dev/null | grep -A15 "Memory Device" | grep -m1 "Configured Clock Speed:" | cut -d: -f2 | xargs || echo "")
                fi
                ram_details="${ram_count}x ${ram_size_first}"
                if [ -n "$ram_type" ] && [ "$ram_type" != "Unknown" ]; then
                  ram_details="${ram_details} ${ram_type}"
                fi
                if [ -n "$ram_speed" ] && [ "$ram_speed" != "Unknown" ] && [ "$ram_speed" != "Configured Clock Speed" ]; then
                  ram_details="${ram_details} @ ${ram_speed}"
                fi
              fi
            fi

            if [ -n "$ram_details" ]; then
              mem_info="$mem_info ($ram_details)"
            fi

            # Read EDGE Version from MOTD / dynamic scripts / config files
            edge_ver="UNKNOWN"
            # 1. Try static MOTD files
            for f in /etc/motd /run/motd.dynamic /var/run/motd /etc/motd.d/*; do
              if [ -r "$f" ]; then
                val=$(grep -A1 -i "^EDGE:" "$f" 2>/dev/null | tail -n1 | xargs || echo "")
                if [ -n "$val" ] && [ "$val" != "EDGE:" ] && [ "$val" != "edge:" ] && [ "$val" != "EDGE" ]; then
                  edge_ver="$val"
                  break
                fi
              fi
            done
            # 2. Try dynamic MOTD scripts
            if [ "$edge_ver" = "UNKNOWN" ]; then
              for f in /etc/update-motd.d/*; do
                if [ -x "$f" ]; then
                  val=$("$f" 2>/dev/null | grep -A1 -i "^EDGE:" | tail -n1 | xargs || echo "")
                  if [ -n "$val" ] && [ "$val" != "EDGE:" ] && [ "$val" != "edge:" ]; then
                    edge_ver="$val"
                    break
                  fi
                fi
              done
            fi
            # 3. Try version file path fallbacks
            if [ "$edge_ver" = "UNKNOWN" ]; then
              for f in /etc/edge-version /etc/edge_version /etc/edge/version; do
                if [ -r "$f" ]; then
                  val=$(cat "$f" | xargs || echo "")
                  if [ -n "$val" ]; then
                    edge_ver="$val"
                    break
                  fi
                fi
              done
            fi

            # Read OS Version
            os_ver="Unknown"
            if [ -f /etc/os-release ]; then
              . /etc/os-release
              os_ver="$NAME $VERSION_ID"
            elif [ -f /etc/debian_version ]; then
              os_ver="Debian $(cat /etc/debian_version)"
            fi

            echo "DISK_TYPE:$disk_type"
            echo "EFI_UUID:$efi_uuid"
            echo "INTERFACE:$net_iface"
            echo "CPU_INFO:$cpu_info"
            echo "MEM_INFO:$mem_info"
            echo "EDGE_VERSION:$edge_ver"
            echo "OS_VERSION:$os_ver"
            echo "HOSTNAME:$(hostname)"
            echo "PART_ROOT:$part_root"
            echo "PART_BOOT:$part_boot"
            echo "PART_EFI:$part_efi"
            echo "PART_LOG:$part_log"
            echo "PART_STOR:$part_stor"
            echo "PARTITION_LAYOUT_JSON:$(lsblk -J -b -o NAME,TYPE,FSTYPE,SIZE,MOUNTPOINT,LABEL,UUID,PARTUUID 2>/dev/null | tr -d '\n')"
          register: sys_info
          changed_when: false

        - name: Print system info for parsing
          debug:
            msg: "{{ sys_info.stdout_lines }}"

        - name: Extract variables from gathered system info
          set_fact:
            disk_type: "{{ item.split('DISK_TYPE:')[1] }}"
          with_items: "{{ sys_info.stdout_lines }}"
          when: "'DISK_TYPE:' in item"

        - name: Extract efi_uuid
          set_fact:
            efi_uuid: "{{ item.split('EFI_UUID:')[1] }}"
          with_items: "{{ sys_info.stdout_lines }}"
          when: "'EFI_UUID:' in item"

        - name: Extract part_root
          set_fact:
            part_root: "{{ item.split('PART_ROOT:')[1] }}"
          with_items: "{{ sys_info.stdout_lines }}"
          when: "'PART_ROOT:' in item"

        - name: Extract part_boot
          set_fact:
            part_boot: "{{ item.split('PART_BOOT:')[1] }}"
          with_items: "{{ sys_info.stdout_lines }}"
          when: "'PART_BOOT:' in item"

        - name: Extract part_log
          set_fact:
            part_log: "{{ item.split('PART_LOG:')[1] }}"
          with_items: "{{ sys_info.stdout_lines }}"
          when: "'PART_LOG:' in item"

        - name: Extract part_stor
          set_fact:
            part_stor: "{{ item.split('PART_STOR:')[1] }}"
          with_items: "{{ sys_info.stdout_lines }}"
          when: "'PART_STOR:' in item"

        - name: Extract part_efi
          set_fact:
            part_efi: "{{ item.split('PART_EFI:')[1] }}"
          with_items: "{{ sys_info.stdout_lines }}"
          when: "'PART_EFI:' in item"

        - name: Label root filesystem
          command: e2label "{{ part_root }}" edgeroot

        - name: Label boot filesystem
          command: e2label "{{ part_boot }}" edgeboot

        - name: Label log filesystem
          command: e2label "{{ part_log }}" edgelog

        - name: Label storage filesystem
          command: e2label "{{ part_stor }}" edgestor

        - name: Strip edgeboot label from EFI partition if present
          shell: |
            fatlabel "{{ part_efi }}" "EFI" || dosfslabel "{{ part_efi }}" "EFI" || true
          ignore_errors: yes

        - name: Rewrite target /etc/fstab with 5-line template
          copy:
            dest: /etc/fstab
            content: |
              # Standardized fstab via Borg Orchestrator Auto-Prepare
              LABEL=edgeroot   /               ext4    defaults,noatime                  0       1
              UUID={{ efi_uuid }}  /boot/efi       vfat    umask=0077,defaults,noatime       0       1
              LABEL=edgeboot   /boot           ext2    defaults,noatime                  0       2
              LABEL=edgelog    /var/log/edge   ext4    defaults,noatime                  0       2
              LABEL=edgestor   /var/opt/edge   ext4    defaults,noatime                  0       2
            mode: '0644'

        - name: Reload systemd daemon
          systemd:
            daemon_reload: yes

        - name: Verify mount configuration live
          command: mount -a

        - name: Update GRUB bootloader configuration
          command: update-grub

        - name: Update initramfs
          command: update-initramfs -u

      rescue:
        - name: Restore fstab from backup on failure
          copy:
            src: /etc/fstab.bak
            dest: /etc/fstab
            remote_src: yes
            mode: '0644'
          ignore_errors: yes

        - name: Reload systemd daemon after rollback
          systemd:
            daemon_reload: yes
          ignore_errors: yes

        - name: Re-mount original filesystems
          command: mount -a
          ignore_errors: yes

        - name: Fail task with error message
          fail:
            msg: "Auto-Prepare failed. Restored fstab to backup."
